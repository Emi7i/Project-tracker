{% load static %}
<span class="badge badge-{{ badge_class }}" style="{% if badge_color %}background: {{ badge_color }}; color: white;{% endif %}" onclick="toggleDropdown('{{ dropdown_prefix }}-{{ project_id }}', {{ project_id }}, event)">{{ badge_label }}</span>
<div id="{{ dropdown_prefix }}-{{ project_id }}" class="status-dropdown" style="display: none;">
    {% for option_value, option_label, option_color in options %}
        <div class="status-dropdown-item" onclick="updateDropdown('{{ dropdown_prefix }}-{{ project_id }}', {{ project_id }}, {% if option_value %}'{{ option_value }}'{% else %}null{% endif %}, '{{ update_url }}', '{{ option_color }}')"{% if forloop.last %} style="border-top: 1px solid var(--color-border-tertiary); margin-top: 4px; padding-top: 8px;"{% endif %}>{{ option_label }}</div>
    {% endfor %}
</div>
