
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Tracker</title>
    <style>
        :root {
            --color-background-primary: #ffffff;
            --color-background-secondary: #f8f9fa;
            --color-background-success: #d4edda;
            --color-background-warning: #fff3cd;
            --color-background-danger: #f8d7da;
            --color-text-primary: #212529;
            --color-text-secondary: #6c757d;
            --color-text-tertiary: #adb5bd;
            --color-text-success: #155724;
            --color-text-warning: #856404;
            --color-text-danger: #721c24;
            --color-border-secondary: #dee2e6;
            --color-border-tertiary: #e9ecef;
            --border-radius-md: 4px;
            --border-radius-lg: 8px;
            --font-mono: 'Courier New', monospace;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--color-background-secondary);
            color: var(--color-text-primary);
            line-height: 1.5;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
*{box-sizing:border-box;margin:0;padding:0}
.proj-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:8px;display:flex;align-items:flex-start;gap:12px}
.proj-dot{width:9px;height:9px;border-radius:50%;margin-top:5px;flex-shrink:0}
.proj-body{flex:1;min-width:0}
.proj-name{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.proj-action{font-size:13px;color:var(--color-text-secondary);font-family:var(--font-mono);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:var(--border-radius-md)}
.badge-ontrack{background:var(--color-background-success);color:var(--color-text-success)}
.badge-atrisk{background:var(--color-background-warning);color:var(--color-text-warning)}
.badge-overdue{background:var(--color-background-danger);color:var(--color-text-danger)}
.badge-ongoing{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.proj-date{font-size:12px;color:var(--color-text-tertiary)}
.proj-actions{display:flex;gap:2px;flex-shrink:0}
.icon-btn{background:transparent;border:none;cursor:pointer;color:var(--color-text-tertiary);font-size:13px;padding:4px 6px;border-radius:4px;line-height:1}
.icon-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.form-row{margin-bottom:10px}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.form-row input,.form-row select{width:100%}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.hint{font-size:11px;color:var(--color-text-tertiary);margin-top:3px}
.stats{font-size:12px;color:var(--color-text-tertiary)}
</style>
</head>
<body>
    <h2 class="sr-only">Project tracker — manage personal and corporate projects with next actions</h2>

    <div id="app" style="padding:1rem 0">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px">
    <div style="display:flex;gap:14px;align-items:center">
      <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--color-text-secondary)">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#BA7517"></span>corporate
      </span>
      <span style="display:flex;align-items:center;gap:5px;font-size:13px;color:var(--color-text-secondary)">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#1D9E75"></span>personal
      </span>
      <span class="stats" id="stats-line"></span>
    </div>
    <button onclick="toggleForm()" style="font-size:13px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer">+ add project</button>
  </div>

  <div id="form-wrap" style="display:none;background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;border:0.5px solid var(--color-border-tertiary)">
    <div class="form-row">
      <label>project name</label>
      <input type="text" id="f-name" placeholder="e.g. Website relaunch" />
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>type</label>
        <select id="f-type" onchange="onTypeChange()">
          <option value="corporate">corporate</option>
          <option value="personal">personal</option>
        </select>
      </div>
      <div class="form-row">
        <label>due date <span id="date-hint" style="color:var(--color-text-tertiary)">(required for corporate)</span></label>
        <input type="date" id="f-date" />
      </div>
    </div>
    <div class="form-row">
      <label>next action</label>
      <input type="text" id="f-action" placeholder="e.g. Send first draft to client" />
    </div>
    <div class="form-btns">
      <button onclick="cancelForm()" style="font-size:13px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-secondary);cursor:pointer">cancel</button>
      <button onclick="saveProject()" id="save-btn" style="font-size:13px;padding:6px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer">save project</button>
    </div>
  </div>

  <div id="project-list"></div>
</div>

<script>
let projects=[];
let editingId=null;

async function load(){
  try{
    if(window.storage && window.storage.get){
      const r=await window.storage.get('proj_v1');
      projects=r?JSON.parse(r.value):[];
    } else {
      const stored=localStorage.getItem('proj_v1');
      projects=stored?JSON.parse(stored):[];
    }
  }catch(e){
    projects=[];
  }
  render();
}

async function persist(){
  try{
    if(window.storage && window.storage.set){
      await window.storage.set('proj_v1',JSON.stringify(projects));
    } else {
      localStorage.setItem('proj_v1',JSON.stringify(projects));
    }
  }catch(e){}
}

function getStatus(due){
  if(!due)return'ongoing';
  const diff=Math.ceil((new Date(due)-new Date())/86400000);
  if(diff<0)return'overdue';
  if(diff<=7)return'atrisk';
  return'ontrack';
}

const statusLabel={ongoing:'ongoing',ontrack:'on track',atrisk:'at risk',overdue:'overdue'};

function daysLabel(due){
  if(!due)return'';
  const diff=Math.ceil((new Date(due)-new Date())/86400000);
  if(diff<0)return Math.abs(diff)+'d overdue';
  if(diff===0)return'due today';
  if(diff===1)return'due tomorrow';
  return'due in '+diff+'d';
}

function fmt(d){
  if(!d)return'';
  const dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(){
  const el=document.getElementById('project-list');
  if(!projects.length){
    el.innerHTML='<div style="text-align:center;padding:3rem 1rem;color:var(--color-text-tertiary);font-size:14px">no projects yet — add your first one above</div>';
    document.getElementById('stats-line').textContent='';
    return;
  }
  const order={overdue:0,atrisk:1,ontrack:2,ongoing:3};
  const sorted=[...projects].sort((a,b)=>order[getStatus(a.dueDate)]-order[getStatus(b.dueDate)]);
  const overdue=projects.filter(p=>getStatus(p.dueDate)==='overdue').length;
  const statsEl=document.getElementById('stats-line');
  statsEl.textContent=projects.length+' project'+(projects.length!==1?'s':'')+(overdue?' · '+overdue+' overdue':'');
  el.innerHTML=sorted.map(p=>{
    const s=getStatus(p.dueDate);
    const dot=p.type==='corporate'?'#BA7517':'#1D9E75';
    return`<div class="proj-card">
      <span class="proj-dot" style="background:${dot}"></span>
      <div class="proj-body">
        <div class="proj-name">${esc(p.name)}</div>
        <div class="proj-action">→ ${esc(p.nextAction||'no next action set')}</div>
        <div class="proj-footer">
          <span class="badge badge-${s}">${statusLabel[s]}</span>
          ${p.dueDate?`<span class="proj-date">${daysLabel(p.dueDate)} · ${fmt(p.dueDate)}</span>`:''}
        </div>
      </div>
      <div class="proj-actions">
        <button class="icon-btn" onclick="editProject('${p.id}')" title="edit">✎</button>
        <button class="icon-btn" onclick="deleteProject('${p.id}')" title="remove">✕</button>
      </div>
    </div>`;
  }).join('');
}

function toggleForm(){
  editingId=null;
  document.getElementById('f-name').value='';
  document.getElementById('f-type').value='corporate';
  document.getElementById('f-date').value='';
  document.getElementById('f-action').value='';
  document.getElementById('save-btn').textContent='save project';
  const w=document.getElementById('form-wrap');
  w.style.display=w.style.display==='none'?'block':'none';
  if(w.style.display==='block')document.getElementById('f-name').focus();
}

function cancelForm(){
  editingId=null;
  document.getElementById('form-wrap').style.display='none';
}

function onTypeChange(){
  const t=document.getElementById('f-type').value;
  document.getElementById('date-hint').textContent=t==='corporate'?'(required)':'(optional)';
}

function saveProject(){
  const name=document.getElementById('f-name').value.trim();
  const type=document.getElementById('f-type').value;
  const dueDate=document.getElementById('f-date').value;
  const nextAction=document.getElementById('f-action').value.trim();
  if(!name){document.getElementById('f-name').focus();return;}
  if(type==='corporate'&&!dueDate){document.getElementById('f-date').focus();return;}
  if(editingId){
    const i=projects.findIndex(p=>p.id===editingId);
    if(i!==-1)projects[i]={...projects[i],name,type,dueDate,nextAction};
    editingId=null;
  }else{
    projects.push({id:Date.now().toString(),name,type,dueDate,nextAction});
  }
  persist();cancelForm();render();
}

function editProject(id){
  const p=projects.find(p=>p.id===id);
  if(!p)return;
  editingId=id;
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-type').value=p.type;
  document.getElementById('f-date').value=p.dueDate||'';
  document.getElementById('f-action').value=p.nextAction||'';
  document.getElementById('save-btn').textContent='update project';
  document.getElementById('date-hint').textContent=p.type==='corporate'?'(required)':'(optional)';
  document.getElementById('form-wrap').style.display='block';
  document.getElementById('f-name').focus();
}

function deleteProject(id){
  projects=projects.filter(p=>p.id!==id);
  persist();render();
}

load();
</script>
<div id="project-list"></div>
</div>

</body>
</html>
